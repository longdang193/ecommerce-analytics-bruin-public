# @architecture
# owner: cube-semantic-layer
# features:
#   - cube-semantic-layer
# stages:
#   - semantic-layer
# capabilities:
#   - cube-semantic-layer.cube-business-views
#   - cube-semantic-layer.governed-metric-definitions
# role: semantic-view
# canonical: true

views:
  - name: model_eval
    description: >
      Model evaluation metrics per run: R², MAE, MSE.
      Source: rai_model_eval. Consumers: Model Monitoring dashboard.
    cubes:
      - join_path: rai_model_eval
        includes:
          - model_name
          - model_version
          - evaluated_at
          - r2_score
          - mean_absolute_error
          - mean_squared_error
